name: berserk_app
description: "BERSERK - Viking themed workout tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  uuid: ^4.2.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  flutter_svg: ^2.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/
