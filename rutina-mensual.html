<!DOCTYPE html>

<title>Rutina de Volumen | Plan Mensual 4 Semanas</title>

<style>
  :root {
    --bg: #0a0a0b; --card: #14141a; --card2: #1a1a22; --border: #222230;
    --accent: #e8ff3a; --accent2: #ff4d2e; --text: #f0f0f0; --muted: #666;
    --chest: #ff4d2e; --back: #3a8eff; --legs: #a855f7; --shoulders: #ff9f3a; --arms: #e8ff3a;
    --warmup: #27ae60; --home: #e67e22;

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; overflow-x:hidden; }

  header { position:relative; padding:50px 40px 40px; overflow:hidden; border-bottom:1px solid var(--border); }
  header::before { content:'VOLUMEN'; position:absolute; top:-10px; right:-10px; font-family:'Bebas Neue'; font-size:160px; color:rgba(232,255,58,0.04); pointer-events:none; line-height:1; }
  .header-tag { display:inline-block; background:var(--accent); color:#000; font-family:'Barlow Condensed'; font-weight:700; font-size:11px; letter-spacing:3px; padding:4px 12px; margin-bottom:16px; }
  h1 { font-family:'Bebas Neue'; font-size:clamp(52px,9vw,88px); line-height:0.9; letter-spacing:2px; }
  h1 span { color:var(--accent); display:block; }
  .header-stats { display:flex; gap:36px; margin-top:28px; flex-wrap:wrap; }
  .stat { display:flex; flex-direction:column; gap:3px; }
  .stat-val { font-family:'Bebas Neue'; font-size:30px; color:var(--accent); line-height:1; }
  .stat-label { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; font-weight:600; }

  /* Week Selector */
  .week-selector { display:flex; border-bottom:1px solid var(--border); padding:0 40px; background:rgba(20,20,26,0.8); backdrop-filter:blur(10px); position:sticky; top:0; z-index:100; }
  .week-btn { background:none; border:none; color:var(--muted); font-family:'Bebas Neue'; font-size:18px; letter-spacing:2px; padding:18px 28px; cursor:pointer; text-transform:uppercase; white-space:nowrap; position:relative; transition:color 0.2s; border-bottom:3px solid transparent; margin-bottom:-1px; }
  .week-btn:hover { color:var(--text); }
  .week-btn.active { color:var(--accent); }
  .week-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:3px; background:var(--accent); }
  .week-btn .week-sub { display:block; font-family:'Barlow Condensed'; font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; }

  .day-nav { display:flex; overflow-x:auto; border-bottom:1px solid var(--border); padding:0 40px; scrollbar-width:none; }
  .day-nav::-webkit-scrollbar { display:none; }
  .day-btn { background:none; border:none; color:var(--muted); font-family:'Barlow Condensed'; font-size:13px; font-weight:700; letter-spacing:2px; padding:16px 22px; cursor:pointer; text-transform:uppercase; white-space:nowrap; position:relative; transition:color 0.2s; border-bottom:3px solid transparent; margin-bottom:-1px; }
  .day-btn:hover { color:var(--text); }
  .day-btn.active { color:var(--text); }
  .day-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:3px; background:var(--accent); }

  main { padding:36px 40px; max-width:1280px; margin:0 auto; }
  .week-panel { display:none; }
  .week-panel.active { display:block; }
  .day-panel { display:none; }
  .day-panel.active { display:block; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .day-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
  .day-title { font-family:'Bebas Neue'; font-size:58px; line-height:0.9; }
  .muscle-tag { font-family:'Barlow Condensed'; font-size:12px; font-weight:700; letter-spacing:3px; padding:5px 13px; text-transform:uppercase; border:1px solid currentColor; margin-top:10px; display:block; width:fit-content; }
  .day-meta { text-align:right; font-family:'Barlow Condensed'; }
  .day-meta .big-num { font-family:'Bebas Neue'; font-size:44px; color:var(--accent); line-height:1; }
  .day-meta small { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; display:block; }

  .exercises-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:16px; margin-bottom:32px; }

  .ex-card { background:var(--card); border:1px solid var(--border); overflow:hidden; display:flex; flex-direction:column; transition:border-color 0.2s, transform 0.2s; }
  .ex-card:hover { border-color:#333344; transform:translateY(-2px); }

  .ex-image-wrap { position:relative; height:190px; overflow:hidden; background:#0c0c14; }
  .ex-image-wrap img { width:100%; height:100%; object-fit:cover; object-position:center top; filter:brightness(0.82) contrast(1.08) saturate(0.9); transition:transform 0.5s ease; display:block; }
  .ex-card:hover .ex-image-wrap img { transform:scale(1.06); }
  .ex-img-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:14px; font-family:'Barlow Condensed'; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; background:linear-gradient(135deg,#0f0f18,#1a1a28); }
  .ex-image-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(10,10,11,0.96) 0%,rgba(10,10,11,0.15) 55%,transparent 100%); }
  .ex-num-badge { position:absolute; top:12px; left:12px; font-family:'Bebas Neue'; font-size:12px; background:rgba(0,0,0,0.8); color:var(--muted); padding:3px 9px; letter-spacing:2px; }
  .ex-type-badge { position:absolute; top:12px; right:12px; font-family:'Barlow Condensed'; font-size:10px; font-weight:700; letter-spacing:2px; padding:3px 9px; text-transform:uppercase; }
  .type-compound { background:rgba(232,255,58,0.15); color:var(--accent); border:1px solid rgba(232,255,58,0.35); }
  .type-iso { background:rgba(255,77,46,0.15); color:var(--accent2); border:1px solid rgba(255,77,46,0.35); }

  .ex-body { padding:14px 16px 16px; display:flex; flex-direction:column; gap:12px; flex:1; }
  .ex-title { font-family:'Barlow Condensed'; font-size:19px; font-weight:700; color:var(--text); line-height:1.15; }
  .ex-subtitle { font-size:12px; color:var(--muted); margin-top:2px; }

  .ex-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); }
  .ex-stat-box { background:var(--card2); padding:9px 6px; text-align:center; }
  .ex-stat-val { font-family:'Bebas Neue'; font-size:20px; color:var(--text); line-height:1; }
  .ex-stat-lbl { font-family:'Barlow Condensed'; font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:2px; }

  .rest-timer-row { display:flex; align-items:center; justify-content:space-between; background:var(--card2); border:1px solid var(--border); padding:9px 12px; gap:8px; }
  .rest-info { display:flex; flex-direction:column; gap:1px; flex:1; }
  .rest-label { font-family:'Barlow Condensed'; font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .rest-val { font-family:'Bebas Neue'; font-size:18px; color:var(--accent); line-height:1; }
  .timer-countdown { font-family:'Bebas Neue'; font-size:20px; color:var(--accent2); min-width:46px; text-align:center; }
  .timer-btn { background:var(--accent); color:#000; border:none; font-family:'Barlow Condensed'; font-weight:700; font-size:11px; letter-spacing:2px; padding:7px 14px; cursor:pointer; text-transform:uppercase; transition:background 0.15s; white-space:nowrap; flex-shrink:0; }
  .timer-btn:hover { background:#d4eb2a; }
  .timer-btn.running { background:var(--accent2); color:#fff; }
  .timer-btn.done { background:#27ae60; color:#fff; }

  .ex-hint { font-size:12px; color:#888; line-height:1.55; border-left:2px solid var(--border); padding-left:10px; }

  .yt-btn { display:flex; align-items:center; gap:8px; background:#ff0000; color:#fff; text-decoration:none; font-family:'Barlow Condensed'; font-weight:700; font-size:12px; letter-spacing:2px; padding:9px 14px; text-transform:uppercase; transition:background 0.15s; border:none; cursor:pointer; }
  .yt-btn:hover { background:#cc0000; }
  .yt-btn svg { flex-shrink:0; }

  .tip-card { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--accent); padding:18px 22px; margin-top:4px; }
  .tip-title { font-family:'Barlow Condensed'; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
  .tip-text { font-size:14px; color:#aaa; line-height:1.65; }

  /* Section headers */
  .section-header { display:flex; align-items:center; gap:14px; margin:32px 0 18px; }
  .section-header::after { content:''; flex:1; height:1px; background:var(--border); }
  .section-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .section-label { font-family:'Bebas Neue'; font-size:26px; letter-spacing:2px; }
  .section-sublabel { font-family:'Barlow Condensed'; font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

  .warmup-icon { background:rgba(39,174,96,0.15); border:1px solid rgba(39,174,96,0.3); }
  .warmup-label { color:var(--warmup); }
  .home-icon { background:rgba(230,126,34,0.15); border:1px solid rgba(230,126,34,0.3); }
  .home-label { color:var(--home); }
  .gym-icon { background:rgba(232,255,58,0.15); border:1px solid rgba(232,255,58,0.3); }
  .gym-label { color:var(--accent); }

  /* Warmup cards */
  .warmup-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-bottom:24px; }
  .warmup-card { background:var(--card); border:1px solid rgba(39,174,96,0.2); padding:16px; display:flex; gap:14px; align-items:flex-start; transition:border-color 0.2s; }

  .warmup-num { font-family:'Bebas Neue'; font-size:28px; color:rgba(39,174,96,0.3); line-height:1; flex-shrink:0; }
  .warmup-name { font-family:'Barlow Condensed'; font-size:15px; font-weight:700; color:var(--text); }
  .warmup-detail { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.45; }
  .warmup-dur { font-family:'Bebas Neue'; font-size:14px; color:var(--warmup); margin-top:6px; }

  /* Home cards */
  .home-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:24px; }
  .home-card { background:var(--card); border:1px solid rgba(230,126,34,0.2); overflow:hidden; transition:border-color 0.2s, transform 0.2s; }

  .home-stat-lbl { font-family:'Barlow Condensed'; font-size:9px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .home-hint { font-size:12px; color:#777; line-height:1.5; margin-top:10px; border-left:2px solid rgba(230,126,34,0.3); padding-left:10px; }

  /* Nutrition */
  .nutrition-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); margin:32px 0; }
  .nutr-box { background:var(--card); padding:20px; text-align:center; }
  .nutr-val { font-family:'Bebas Neue'; font-size:36px; color:var(--accent); line-height:1; }
  .nutr-label { font-family:'Barlow Condensed'; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:4px; }
  .principles { display:grid; grid-template-columns:repeat(auto-fit,minmax(195px,1fr)); gap:14px; margin-top:32px; }
  .principle-card { background:var(--card); border:1px solid var(--border); padding:20px; }
  .principle-num { font-family:'Bebas Neue'; font-size:42px; color:var(--border); line-height:1; margin-bottom:6px; }
  .principle-title { font-family:'Barlow Condensed'; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
  .principle-text { font-size:13px; color:#888; line-height:1.6; }

  /* Color themes */
  [data-color="chest"] .day-title { color:var(--chest); } [data-color="chest"] .muscle-tag { color:var(--chest); border-color:var(--chest); }
  [data-color="back"] .day-title { color:var(--back); } [data-color="back"] .muscle-tag { color:var(--back); border-color:var(--back); }
  [data-color="legs"] .day-title { color:var(--legs); } [data-color="legs"] .muscle-tag { color:var(--legs); border-color:var(--legs); }
  [data-color="shoulders"] .day-title { color:var(--shoulders); } [data-color="shoulders"] .muscle-tag { color:var(--shoulders); border-color:var(--shoulders); }
  [data-color="arms"] .day-title { color:var(--arms); } [data-color="arms"] .muscle-tag { color:var(--arms); border-color:var(--arms); }

  /* Progress bar */
  .progress-wrap { padding:0 40px; border-bottom:1px solid var(--border); }
  .progress-bar-bg { height:4px; background:var(--card2); position:relative; }
  .progress-bar-fill { height:100%; background:var(--accent); transition:width 0.5s ease; }
  .progress-info { display:flex; justify-content:space-between; padding:8px 0; }
  .progress-label { font-family:'Barlow Condensed'; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

  @media(max-width:768px) {
    header, main { padding:22px 16px; }
    .week-selector, .day-nav { padding:0 14px; }
    .week-btn { padding:14px 16px; font-size:15px; }
    h1 { font-size:46px; }
    .exercises-grid, .home-grid { grid-template-columns:1fr; }
    .warmup-grid { grid-template-columns:1fr 1fr; }
    .day-title { font-size:46px; }
  }
  @media(max-width:480px) {
    .warmup-grid { grid-template-columns:1fr; }
    .week-btn { padding:12px 10px; font-size:13px; }
  }
</style>
</head>

// ══════════ RENDER FUNCTIONS ══════════

function renderExCard(ex, idx) {
  const typeClass = ex.type === 'compound' ? 'type-compound' : 'type-iso';
  const typeLabel = ex.type === 'compound' ? 'Compuesto' : 'Aislado';
  const num = String(idx + 1).padStart(2, '0');
  return `
    <div class="ex-card">
      <div class="ex-image-wrap">
        <img src="${ex.img}" alt="${ex.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="ex-img-fallback" style="display:none">${ex.title.substring(0,20).toUpperCase()}</div>
        <div class="ex-image-overlay"></div>
        <div class="ex-num-badge">${num}</div>
        <div class="ex-type-badge ${typeClass}">${typeLabel}</div>
      </div>
      <div class="ex-body">
        <div><div class="ex-title">${ex.title}</div><div class="ex-subtitle">${ex.sub}</div></div>
        <div class="ex-stats">
          <div class="ex-stat-box"><div class="ex-stat-val">${ex.s}</div><div class="ex-stat-lbl">Series</div></div>
          <div class="ex-stat-box"><div class="ex-stat-val">${ex.r}</div><div class="ex-stat-lbl">Reps</div></div>
          <div class="ex-stat-box"><div class="ex-stat-val">${ex.extra}</div><div class="ex-stat-lbl">${ex.extraL}</div></div>
        </div>
        <div class="rest-timer-row" data-seconds="${ex.restSec}">
          <div class="rest-info"><div class="rest-label">Pausa entre series</div><div class="rest-val">${ex.rest}</div></div>
          <div class="timer-countdown"></div>
          <button class="timer-btn" onclick="startTimer(this)">▶ Iniciar</button>
        </div>
        <div class="ex-hint">${ex.hint}</div>
      </div>
    </div>`;
}

function renderWarmup(items) {
  return items.map((w, i) => `
    <div class="warmup-card">
      <div class="warmup-num">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="warmup-name">${w.name}</div>
        <div class="warmup-detail">${w.detail}</div>
        <div class="warmup-dur">${w.dur}</div>
      </div>
    </div>`).join('');
}

function renderHomeCard(h, idx) {

// ══════════ NAVIGATION ══════════

function showWeek(weekId, btn) {
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.week-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.week-daynav').forEach(n => n.style.display = 'none');
  document.getElementById('weekpanel-' + weekId).classList.add('active');
  document.getElementById('daynav-' + weekId).style.display = 'flex';

  // Show first day
  const panel = document.getElementById('weekpanel-' + weekId);
  panel.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  const first = panel.querySelector('.day-panel');
  if (first) first.classList.add('active');

  const dayNav = document.getElementById('daynav-' + weekId);
  dayNav.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  const firstBtn = dayNav.querySelector('.day-btn');
  if (firstBtn) firstBtn.classList.add('active');

  // Progress
  const weekIdx = WEEKS.findIndex(w => w.id === weekId);
  const pct = Math.round(((weekIdx + 1) / WEEKS.length) * 100);
  document.getElementById('progressLabel').textContent = `Semana ${weekIdx+1} de ${WEEKS.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function showDay(dayId, btn, navId) {
  const nav = document.getElementById(navId);
  const weekId = navId.replace('daynav-', '');
  const panel = document.getElementById('weekpanel-' + weekId);
  panel.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  nav.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(dayId).classList.add('active');
  btn.classList.add('active');
}

// ══════════ TIMER ══════════

const timers = new Map();
function startTimer(btn) {
  const row = btn.closest('.rest-timer-row');
  const totalSec = parseInt(row.dataset.seconds);
  const cd = row.querySelector('.timer-countdown');
  if (timers.has(row)) {
    clearInterval(timers.get(row)); timers.delete(row);
    btn.textContent = '▶ Iniciar'; btn.className = 'timer-btn'; cd.textContent = '';
    return;
  }
  btn.textContent = '⏹ Parar'; btn.classList.add('running');
  let rem = totalSec;
  cd.textContent = fmt(rem);
  const iv = setInterval(() => {
    rem--;
    if (rem <= 0) {
      clearInterval(iv); timers.delete(row);
      btn.textContent = '✓ Listo'; btn.className = 'timer-btn done'; cd.textContent = '0:00';
      setTimeout(() => { btn.textContent = '▶ Iniciar'; btn.className = 'timer-btn'; cd.textContent = ''; }, 3000);
    } else { cd.textContent = fmt(rem); }
  }, 1000);
  timers.set(row, iv);
}
function fmt(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
